<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            color: #007bff;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-family: inherit;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            background-color: #fff;
        }
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        button:hover:not(:disabled) {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .error {
            color: #d9534f;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        @media (max-width: 400px) {
            .buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Text-to-Speech</h1>
    <div id="error-message" class="error">Keine deutsche Stimme verfügbar.</div>
    <textarea id="text-input" placeholder="Geben Sie hier Ihren Text ein..."></textarea>
    <select id="voice-select">
        <option value="">Lade Stimmen...</option>
    </select>
    <div class="buttons">
        <button id="btn-start">Start</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-resume">Fortsetzen</button>
        <button id="btn-stop">Stop</button>
    </div>
</div>

<script>
    const textInput = document.getElementById('text-input');
    const voiceSelect = document.getElementById('voice-select');
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnResume = document.getElementById('btn-resume');
    const btnStop = document.getElementById('btn-stop');
    const errorMessage = document.getElementById('error-message');

    let voices = [];
    let synth = window.speechSynthesis;

    function populateVoiceList() {
        // Filtere alle Stimmen, die mit 'de' beginnen (z.B. de-DE, de-AT, de-CH)
        voices = synth.getVoices().filter(voice => voice.lang.toLowerCase().startsWith('de'));
        
        voiceSelect.innerHTML = '';
        
        if (voices.length === 0) {
            errorMessage.style.display = 'block';
            const option = document.createElement('option');
            option.textContent = 'Keine deutsche Stimme verfügbar';
            voiceSelect.appendChild(option);
            voiceSelect.disabled = true;
            btnStart.disabled = true;
            btnPause.disabled = true;
            btnResume.disabled = true;
            btnStop.disabled = true;
            return;
        }

        errorMessage.style.display = 'none';
        voiceSelect.disabled = false;
        btnStart.disabled = false;
        btnPause.disabled = false;
        btnResume.disabled = false;
        btnStop.disabled = false;

        voices.forEach((voice) => {
            const option = document.createElement('option');
            option.textContent = `${voice.name} (${voice.lang})`;
            option.setAttribute('data-lang', voice.lang);
            option.setAttribute('data-name', voice.name);
            voiceSelect.appendChild(option);
        });
    }

    // Für Browser, die Stimmen asynchron laden
    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    btnStart.addEventListener('click', () => {
        // Beende aktuelle Ausgabe
        if (synth.speaking || synth.paused) {
            synth.cancel();
        }
        
        const text = textInput.value.trim();
        if (text !== '') {
            const utterThis = new SpeechSynthesisUtterance(text);
            const selectedOption = voiceSelect.selectedOptions[0].getAttribute('data-name');
            
            for (let i = 0; i < voices.length; i++) {
                if (voices[i].name === selectedOption) {
                    utterThis.voice = voices[i];
                    break;
                }
            }
            
            synth.speak(utterThis);
        }
    });

    btnPause.addEventListener('click', () => {
        if (synth.speaking && !synth.paused) {
            synth.pause();
        }
    });

    btnResume.addEventListener('click', () => {
        if (synth.paused) {
            synth.resume();
        }
    });

    btnStop.addEventListener('click', () => {
        if (synth.speaking || synth.paused) {
            synth.cancel();
        }
    });
</script>

</body>
</html>
