<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            color: #007bff;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-family: inherit;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            background-color: #fff;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .controls label {
            display: flex;
            flex-direction: column;
            font-size: 14px;
            font-weight: bold;
        }
        .controls input[type="range"] {
            margin-top: 5px;
        }
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        button:hover:not(:disabled) {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .error {
            color: #d9534f;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 15px;
            text-align: center;
        }
        @media (max-width: 400px) {
            .buttons {
                grid-template-columns: 1fr;
            }
        }
    
        .current-sentence-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
        .current-sentence-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        #current-sentence-display {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            min-height: 35px;
            word-wrap: break-word;
        }
        .text-preview {
            width: 100%;
            min-height: 100px;
            max-height: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            background-color: #fafafa;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: inherit;
        }
        .active-sentence {
            background-color: #ffeeba;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Text-to-Speech</h1>
    <div id="error-message" class="error">Keine deutsche Stimme verfügbar.</div>
    <div id="text-error" class="error">Bitte Text eingeben.</div>
    
    <div class="current-sentence-box">
        <div class="current-sentence-label">Aktuell gesprochen:</div>
        <div id="current-sentence-display">Noch nichts gestartet.</div>
    </div>

    <textarea id="text-input" placeholder="Geben Sie hier Ihren Text ein..."></textarea>
    
    <div id="text-preview" class="text-preview"></div>

    <div class="controls">
        <label>
            Geschwindigkeit: <span id="rate-val">0.92</span>
            <input type="range" id="rate" min="0.6" max="1.4" step="0.05" value="0.92">
        </label>
        <label>
            Tonhöhe: <span id="pitch-val">1.0</span>
            <input type="range" id="pitch" min="0.7" max="1.3" step="0.05" value="1.0">
        </label>
        <label>
            Lautstärke: <span id="volume-val">1.0</span>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="1.0">
        </label>
        <label>
            Wiederholung:
            <select id="repeat-mode">
                <option value="once">1x abspielen</option>
                <option value="twice">2x abspielen</option>
                <option value="loop">Loop / endlos</option>
            </select>
        </label>
    </div>

    <select id="voice-select">
        <option value="">Lade Stimmen...</option>
    </select>

    <div class="buttons">
        <button id="btn-start">Start</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-resume">Fortsetzen</button>
        <button id="btn-stop">Stop</button>
    </div>
    
    <p class="hint">Die verfügbaren Stimmen hängen von deinem Browser und Betriebssystem ab. Für bessere deutsche Stimmen installiere zusätzliche Systemstimmen.</p>
</div>

<script>
    const textInput = document.getElementById('text-input');
    const textPreview = document.getElementById('text-preview');
    const currentSentenceDisplay = document.getElementById('current-sentence-display');
    const voiceSelect = document.getElementById('voice-select');
    const repeatModeSelect = document.getElementById('repeat-mode');
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnResume = document.getElementById('btn-resume');
    const btnStop = document.getElementById('btn-stop');
    const errorMessage = document.getElementById('error-message');
    const textError = document.getElementById('text-error');
    
    const rateInput = document.getElementById('rate');
    const pitchInput = document.getElementById('pitch');
    const volumeInput = document.getElementById('volume');
    const rateVal = document.getElementById('rate-val');
    const pitchVal = document.getElementById('pitch-val');
    const volumeVal = document.getElementById('volume-val');

    let voices = [];
    let synth = window.speechSynthesis;

    let sentences = [];
    let currentSentenceIndex = -1;
    let isSpeaking = false;
    let isPaused = false;
    let latestCursorPosition = 0;
    let userSelectedNewPosition = false;

    let playbackStartIndex = 0;
    let completedPlaythroughs = 0;
    let isStopped = true;
    let speechSessionId = 0;

    const repeatDelayMs = 350;

    const savedRate = localStorage.getItem('tts-rate') || '0.92';
    const savedPitch = localStorage.getItem('tts-pitch') || '1.0';
    const savedVolume = localStorage.getItem('tts-volume') || '1.0';
    const savedRepeatMode = localStorage.getItem('tts-repeat-mode') || 'once';
    
    rateInput.value = savedRate;
    pitchInput.value = savedPitch;
    volumeInput.value = savedVolume;
    repeatModeSelect.value = savedRepeatMode;

    rateVal.textContent = savedRate;
    pitchVal.textContent = savedPitch;
    volumeVal.textContent = savedVolume;

    function updateValue(input, display, storageKey) {
        input.addEventListener('input', () => {
            display.textContent = input.value;
            localStorage.setItem(storageKey, input.value);
        });
    }

    updateValue(rateInput, rateVal, 'tts-rate');
    updateValue(pitchInput, pitchVal, 'tts-pitch');
    updateValue(volumeInput, volumeVal, 'tts-volume');

    repeatModeSelect.addEventListener('change', () => {
        localStorage.setItem('tts-repeat-mode', repeatModeSelect.value);
    });

    function getVoiceScore(voice) {
        let score = 0;
        if (voice.lang === 'de-DE') score += 10;
        
        const name = voice.name.toLowerCase();
        const positiveKeywords = ['neural', 'natural', 'premium', 'enhanced', 'google', 'microsoft', 'katja', 'conrad', 'anna', 'siri'];
        const negativeKeywords = ['espeak', 'pico', 'compact'];
        
        positiveKeywords.forEach(kw => {
            if (name.includes(kw)) score += 5;
        });
        
        negativeKeywords.forEach(kw => {
            if (name.includes(kw)) score -= 10;
        });
        
        return score;
    }

    function populateVoiceList() {
        const allowedLangs = ['de', 'de-de', 'de-at', 'de-ch'];
        voices = synth.getVoices().filter(voice => allowedLangs.includes(voice.lang.toLowerCase()));
        
        if (voices.length === 0) {
            errorMessage.style.display = 'block';
            voiceSelect.innerHTML = '<option value="">Keine deutsche Stimme verfügbar</option>';
            voiceSelect.disabled = true;
            btnStart.disabled = true;
            btnPause.disabled = true;
            btnResume.disabled = true;
            btnStop.disabled = true;
            return;
        }

        errorMessage.style.display = 'none';
        voiceSelect.disabled = false;

        voices.sort((a, b) => getVoiceScore(b) - getVoiceScore(a));

        voiceSelect.innerHTML = '';
        
        const savedVoiceURI = localStorage.getItem('tts-voice');
        let voiceFound = false;

        voices.forEach((voice) => {
            const option = document.createElement('option');
            const score = getVoiceScore(voice);
            const recommended = score >= 10 ? ' (empfohlen)' : '';
            const location = voice.localService ? 'Lokal' : 'Browser/Online';
            
            option.textContent = `${voice.name} (${voice.lang}, ${location})${recommended}`;
            option.value = voice.voiceURI;
            
            if (savedVoiceURI === voice.voiceURI) {
                option.selected = true;
                voiceFound = true;
            }
            
            voiceSelect.appendChild(option);
        });
        
        if (!voiceFound && voices.length > 0) {
            voiceSelect.selectedIndex = 0;
        }
        
        updateButtonsState();
    }

    voiceSelect.addEventListener('change', () => {
        localStorage.setItem('tts-voice', voiceSelect.value);
    });

    function normalizeText(text) {
        return text;
    }

    function splitTextIntoSentences(text) {
        let result = [];
        const regex = /[\s\S]*?[.!?\n]+|[\s\S]+$/g;
        let match;

        while ((match = regex.exec(text)) !== null) {
            if (match[0].length === 0) break;

            result.push({
                text: match[0],
                startIndex: match.index,
                endIndex: match.index + match[0].length
            });
        }

        return result;
    }

    function getSentenceIndexFromCursor(cursorPosition) {
        if (sentences.length === 0) return 0;

        for (let i = 0; i < sentences.length; i++) {
            if (cursorPosition >= sentences[i].startIndex && cursorPosition <= sentences[i].endIndex) {
                return i;
            }
        }

        return sentences.length - 1;
    }

    function getSentenceIndexFromCharIndex(charIndex) {
        if (sentences.length === 0) return 0;

        for (let i = 0; i < sentences.length; i++) {
            if (charIndex >= sentences[i].startIndex && charIndex < sentences[i].endIndex) {
                return i;
            }
        }

        return sentences.length - 1;
    }

    function renderHighlightedText(activeSentenceIndex) {
        const text = textInput.value;

        if (sentences.length === 0 && text.length > 0) {
            sentences = splitTextIntoSentences(text);
        }
        
        textPreview.innerHTML = '';
        
        if (text.length === 0) return;

        let currentIndex = 0;

        sentences.forEach((sentence, index) => {
            if (sentence.startIndex > currentIndex) {
                const span = document.createElement('span');
                span.textContent = text.substring(currentIndex, sentence.startIndex);
                textPreview.appendChild(span);
            }
            
            const span = document.createElement('span');
            span.textContent = sentence.text;

            if (index === activeSentenceIndex) {
                span.classList.add('active-sentence');
            }

            textPreview.appendChild(span);
            currentIndex = sentence.endIndex;
        });
        
        if (currentIndex < text.length) {
            const span = document.createElement('span');
            span.textContent = text.substring(currentIndex);
            textPreview.appendChild(span);
        }
    }

    function updateCurrentSentenceDisplay(sentenceText) {
        if (sentenceText && sentenceText.trim()) {
            currentSentenceDisplay.textContent = sentenceText.trim();
        } else {
            currentSentenceDisplay.textContent = "Noch nichts gestartet.";
        }
    }

    function updateButtonsState() {
        if (voices.length === 0) return;
        
        btnStart.disabled = false;
        btnPause.disabled = !isSpeaking || isPaused;
        btnResume.disabled = !isPaused;
        btnStop.disabled = !isSpeaking && !isPaused;
    }

    function finishSpeech() {
        isSpeaking = false;
        isPaused = false;
        isStopped = true;
        currentSentenceIndex = -1;
        completedPlaythroughs = 0;
        renderHighlightedText(-1);
        updateCurrentSentenceDisplay("");
        updateButtonsState();
    }

    function stopSpeech() {
        speechSessionId++;
        isStopped = true;
        synth.cancel();
        finishSpeech();
    }

    function pauseSpeech() {
        if (isSpeaking && !isPaused) {
            synth.pause();
            isPaused = true;
            updateButtonsState();
        }
    }

    function resumeSpeech() {
        if (isPaused) {
            if (userSelectedNewPosition) {
                speechSessionId++;
                synth.cancel();

                const idx = getSentenceIndexFromCursor(latestCursorPosition);
                speakFromSentence(idx);
            } else {
                synth.resume();
                isPaused = false;
                updateButtonsState();
            }
        }
    }

    function handlePlaythroughFinished(sessionId) {
        if (sessionId !== speechSessionId || isStopped) return;

        completedPlaythroughs++;

        const repeatMode = repeatModeSelect.value;
        const shouldRepeat =
            repeatMode === 'loop' ||
            (repeatMode === 'twice' && completedPlaythroughs < 2);

        if (shouldRepeat) {
            currentSentenceIndex = playbackStartIndex;

            setTimeout(() => {
                if (sessionId === speechSessionId && !isStopped && isSpeaking && !isPaused) {
                    speakNextSentence(sessionId);
                }
            }, repeatDelayMs);
        } else {
            finishSpeech();
        }
    }

    function speakNextSentence(sessionId = speechSessionId) {
        if (sessionId !== speechSessionId || isStopped || !isSpeaking) {
            return;
        }

        if (currentSentenceIndex >= sentences.length) {
            handlePlaythroughFinished(sessionId);
            return;
        }

        const startSentenceIndex = currentSentenceIndex;
        const startCharIndex = sentences[startSentenceIndex].startIndex;
        const fullText = normalizeText(textInput.value);
        const textToSpeak = fullText.substring(startCharIndex);

        if (textToSpeak.trim() === '') {
            handlePlaythroughFinished(sessionId);
            return;
        }

        renderHighlightedText(startSentenceIndex);
        updateCurrentSentenceDisplay(sentences[startSentenceIndex].text.trim());
        updateButtonsState();

        const utterThis = new SpeechSynthesisUtterance(textToSpeak);

        const selectedURI = voiceSelect.value;
        const selectedVoice = voices.find(v => v.voiceURI === selectedURI);

        if (selectedVoice) {
            utterThis.voice = selectedVoice;
        }

        utterThis.rate = parseFloat(rateInput.value);
        utterThis.pitch = parseFloat(pitchInput.value);
        utterThis.volume = parseFloat(volumeInput.value);
        utterThis.lang = selectedVoice ? selectedVoice.lang : "de-DE";

        utterThis.onstart = () => {
            if (sessionId !== speechSessionId || isStopped) return;

            isSpeaking = true;
            isPaused = false;
            updateButtonsState();
        };

        utterThis.onboundary = (event) => {
            if (sessionId !== speechSessionId || isStopped || isPaused) return;
            if (typeof event.charIndex !== 'number') return;

            const originalCharIndex = startCharIndex + event.charIndex;
            const activeIndex = getSentenceIndexFromCharIndex(originalCharIndex);

            if (activeIndex !== currentSentenceIndex) {
                currentSentenceIndex = activeIndex;
                renderHighlightedText(currentSentenceIndex);
                updateCurrentSentenceDisplay(sentences[currentSentenceIndex].text.trim());
            }
        };

        utterThis.onend = () => {
            if (sessionId === speechSessionId && isSpeaking && !isPaused && !isStopped) {
                currentSentenceIndex = sentences.length;
                handlePlaythroughFinished(sessionId);
            }
        };

        utterThis.onerror = (e) => {
            console.error('SpeechSynthesis error:', e);
        };

        synth.speak(utterThis);
    }

    function speakFromSentence(index) {
        const text = normalizeText(textInput.value);

        if (text.trim() === '') {
            textError.style.display = 'block';
            return;
        }

        textError.style.display = 'none';
        
        speechSessionId++;
        const sessionId = speechSessionId;

        isStopped = false;
        completedPlaythroughs = 0;

        synth.cancel();

        sentences = splitTextIntoSentences(text);
        
        if (sentences.length === 0) {
            finishSpeech();
            return;
        }
        
        currentSentenceIndex = Math.max(0, Math.min(index, sentences.length - 1));
        playbackStartIndex = currentSentenceIndex;

        isSpeaking = true;
        isPaused = false;
        userSelectedNewPosition = false;
        
        speakNextSentence(sessionId);
    }

    function handleCursorUpdate() {
        latestCursorPosition = textInput.selectionStart;

        if (isPaused) {
            userSelectedNewPosition = true;
        }
        
        if (!isSpeaking || isPaused) {
            const tempSentences = splitTextIntoSentences(textInput.value);

            if (tempSentences.length > 0) {
                sentences = tempSentences;
                const idx = getSentenceIndexFromCursor(latestCursorPosition);
                renderHighlightedText(idx);
            } else {
                renderHighlightedText(-1);
            }
        }
    }

    textInput.addEventListener('click', handleCursorUpdate);
    textInput.addEventListener('keyup', handleCursorUpdate);
    textInput.addEventListener('select', handleCursorUpdate);

    textInput.addEventListener('input', () => {
        if (textInput.value.trim() !== '') {
            textError.style.display = 'none';
        }
        
        if (isSpeaking && !isPaused) {
            stopSpeech();
        } else {
            sentences = splitTextIntoSentences(textInput.value);
            renderHighlightedText(-1);
        }
    });

    btnStart.addEventListener('click', () => {
        let startIdx = 0;

        if (userSelectedNewPosition || (latestCursorPosition > 0 && !isSpeaking)) {
            sentences = splitTextIntoSentences(textInput.value);
            startIdx = getSentenceIndexFromCursor(latestCursorPosition);
        }

        speakFromSentence(startIdx);
    });

    btnPause.addEventListener('click', pauseSpeech);
    btnResume.addEventListener('click', resumeSpeech);
    btnStop.addEventListener('click', stopSpeech);

    populateVoiceList();

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }
    
    renderHighlightedText(-1);
</script>

</body>
</html>
