<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            color: #007bff;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-family: inherit;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            background-color: #fff;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .controls label {
            display: flex;
            flex-direction: column;
            font-size: 14px;
            font-weight: bold;
        }
        .controls input[type="range"] {
            margin-top: 5px;
        }
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        button:hover:not(:disabled) {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .error {
            color: #d9534f;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 15px;
            text-align: center;
        }
        @media (max-width: 400px) {
            .buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Text-to-Speech</h1>
    <div id="error-message" class="error">Keine deutsche Stimme verfügbar.</div>
    <div id="text-error" class="error">Bitte Text eingeben.</div>
    <textarea id="text-input" placeholder="Geben Sie hier Ihren Text ein..."></textarea>
    
    <div class="controls">
        <label>
            Geschwindigkeit: <span id="rate-val">0.92</span>
            <input type="range" id="rate" min="0.6" max="1.4" step="0.05" value="0.92">
        </label>
        <label>
            Tonhöhe: <span id="pitch-val">1.0</span>
            <input type="range" id="pitch" min="0.7" max="1.3" step="0.05" value="1.0">
        </label>
        <label>
            Lautstärke: <span id="volume-val">1.0</span>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="1.0">
        </label>
    </div>

    <select id="voice-select">
        <option value="">Lade Stimmen...</option>
    </select>

    <div class="buttons">
        <button id="btn-start">Start</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-resume">Fortsetzen</button>
        <button id="btn-stop">Stop</button>
    </div>
    
    <p class="hint">Die verfügbaren Stimmen hängen von deinem Browser und Betriebssystem ab. Für bessere deutsche Stimmen installiere zusätzliche Systemstimmen.</p>
</div>

<script>
    const textInput = document.getElementById('text-input');
    const voiceSelect = document.getElementById('voice-select');
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnResume = document.getElementById('btn-resume');
    const btnStop = document.getElementById('btn-stop');
    const errorMessage = document.getElementById('error-message');
    const textError = document.getElementById('text-error');
    
    const rateInput = document.getElementById('rate');
    const pitchInput = document.getElementById('pitch');
    const volumeInput = document.getElementById('volume');
    const rateVal = document.getElementById('rate-val');
    const pitchVal = document.getElementById('pitch-val');
    const volumeVal = document.getElementById('volume-val');

    let voices = [];
    let synth = window.speechSynthesis;

    const savedRate = localStorage.getItem('tts-rate') || '0.92';
    const savedPitch = localStorage.getItem('tts-pitch') || '1.0';
    const savedVolume = localStorage.getItem('tts-volume') || '1.0';
    
    rateInput.value = savedRate;
    pitchInput.value = savedPitch;
    volumeInput.value = savedVolume;
    rateVal.textContent = savedRate;
    pitchVal.textContent = savedPitch;
    volumeVal.textContent = savedVolume;

    function updateValue(input, display, storageKey) {
        input.addEventListener('input', () => {
            display.textContent = input.value;
            localStorage.setItem(storageKey, input.value);
        });
    }

    updateValue(rateInput, rateVal, 'tts-rate');
    updateValue(pitchInput, pitchVal, 'tts-pitch');
    updateValue(volumeInput, volumeVal, 'tts-volume');

    function getVoiceScore(voice) {
        let score = 0;
        if (voice.lang === 'de-DE') score += 10;
        
        const name = voice.name.toLowerCase();
        const positiveKeywords = ['neural', 'natural', 'premium', 'enhanced', 'google', 'microsoft', 'katja', 'conrad', 'anna', 'siri'];
        const negativeKeywords = ['espeak', 'pico', 'compact'];
        
        positiveKeywords.forEach(kw => {
            if (name.includes(kw)) score += 5;
        });
        
        negativeKeywords.forEach(kw => {
            if (name.includes(kw)) score -= 10;
        });
        
        return score;
    }

    function populateVoiceList() {
        const allowedLangs = ['de', 'de-de', 'de-at', 'de-ch'];
        voices = synth.getVoices().filter(voice => allowedLangs.includes(voice.lang.toLowerCase()));
        
        if (voices.length === 0) {
            errorMessage.style.display = 'block';
            voiceSelect.innerHTML = '<option value="">Keine deutsche Stimme verfügbar</option>';
            voiceSelect.disabled = true;
            btnStart.disabled = true;
            btnPause.disabled = true;
            btnResume.disabled = true;
            btnStop.disabled = true;
            return;
        }

        errorMessage.style.display = 'none';
        voiceSelect.disabled = false;

        voices.sort((a, b) => getVoiceScore(b) - getVoiceScore(a));

        voiceSelect.innerHTML = '';
        
        const savedVoiceURI = localStorage.getItem('tts-voice');
        let voiceFound = false;

        voices.forEach((voice) => {
            const option = document.createElement('option');
            const score = getVoiceScore(voice);
            const recommended = score >= 10 ? ' (empfohlen)' : '';
            const location = voice.localService ? 'Lokal' : 'Browser/Online';
            
            option.textContent = `${voice.name} (${voice.lang}, ${location})${recommended}`;
            option.value = voice.voiceURI;
            
            if (savedVoiceURI === voice.voiceURI) {
                option.selected = true;
                voiceFound = true;
            }
            
            voiceSelect.appendChild(option);
        });
        
        if (!voiceFound && voices.length > 0) {
            voiceSelect.selectedIndex = 0;
        }
        
        updateButtonsState();
    }

    voiceSelect.addEventListener('change', () => {
        localStorage.setItem('tts-voice', voiceSelect.value);
    });

    function updateButtonsState() {
        if (voices.length === 0) return;
        btnStart.disabled = false;
        btnPause.disabled = !(synth.speaking && !synth.paused);
        btnResume.disabled = !synth.paused;
        btnStop.disabled = !synth.speaking;
    }

    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    textInput.addEventListener('input', () => {
        if (textInput.value.trim() !== '') {
            textError.style.display = 'none';
        }
    });

    btnStart.addEventListener('click', () => {
        const text = textInput.value.trim();
        if (text === '') {
            textError.style.display = 'block';
            return;
        }
        textError.style.display = 'none';

        if (synth.speaking || synth.paused) {
            synth.cancel();
        }
        
        const utterThis = new SpeechSynthesisUtterance(text);
        
        const selectedURI = voiceSelect.value;
        const selectedVoice = voices.find(v => v.voiceURI === selectedURI);
        if (selectedVoice) {
            utterThis.voice = selectedVoice;
        }
        
        utterThis.rate = parseFloat(rateInput.value);
        utterThis.pitch = parseFloat(pitchInput.value);
        utterThis.volume = parseFloat(volumeInput.value);
        utterThis.lang = selectedVoice ? selectedVoice.lang : "de-DE";
        
        utterThis.onstart = updateButtonsState;
        utterThis.onend = () => {
            updateButtonsState();
            btnPause.disabled = true;
            btnResume.disabled = true;
            btnStop.disabled = true;
        };
        utterThis.onpause = updateButtonsState;
        utterThis.onresume = updateButtonsState;
        utterThis.onerror = () => {
            updateButtonsState();
            btnPause.disabled = true;
            btnResume.disabled = true;
            btnStop.disabled = true;
        };
        
        synth.speak(utterThis);
        setTimeout(updateButtonsState, 100);
    });

    btnPause.addEventListener('click', () => {
        if (synth.speaking && !synth.paused) {
            synth.pause();
            updateButtonsState();
        }
    });

    btnResume.addEventListener('click', () => {
        if (synth.paused) {
            synth.resume();
            updateButtonsState();
        }
    });

    btnStop.addEventListener('click', () => {
        if (synth.speaking || synth.paused) {
            synth.cancel();
            updateButtonsState();
            btnPause.disabled = true;
            btnResume.disabled = true;
            btnStop.disabled = true;
        }
    });
</script>

</body>
</html>
